<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletor de Classes RPG</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            border-radius: 4px;
            border: 1px solid #ffd700;
            background: rgba(0, 0, 0, 0.7);
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: #ffd700;
            color: #000;
            transform: scale(1.05);
        }

        .reroll-button {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 4px;
            border: 1px solid #ffd700;
            background: rgba(0, 0, 0, 0.7);
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
            z-index: 1000;
        }

        .reroll-button:hover {
            background: #ffd700;
            color: #000;
            transform: scale(1.05);
        }

        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .card {
            position: absolute;
            width: 200px;
            height: 300px;
            border-radius: 15px;
            box-sizing: border-box;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 5s ease;
            text-align: center;
            color: white;
            backdrop-filter: blur(5px);
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card:hover {
            transform: scale(1.1);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
        }

        .card-front {
            background: url('output.jpg') no-repeat center center;
            background-size: cover;
        }

        .card-back {
            background: rgba(0, 0, 0, 0.5);
            transform: rotateY(180deg);
            color: white;
        }

        /* Estilos de raridade aplicados à .card e suas faces */

        /* Comuns - Brilho Silver */
        .card.uncommon .card-front, .card.uncommon .card-back {
            border: 2px solid #c0c0c0;
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.7);
        }

        /* Raras - Brilho Blue */
        .card.rare .card-front, .card.rare .card-back {
            border: 2px solid #007bff;
            box-shadow: 0 0 28px rgba(0, 123, 255, 0.8);
        }

        /* Épicas - Brilho Roxo */
        .card.epic .card-front, .card.epic .card-back {
            border: 2px solid #800080;
            box-shadow: 0 0 35px rgba(128, 0, 128, 0.9);
        }

        /* Lendárias - Brilho Dourado */
        .card.legendary .card-front, .card.legendary .card-back {
            border: 2px solid #ffd700;
            box-shadow: 0 0 42px rgba(255, 215, 0, 1.0);
        }
        
        /* Únicas - Brilho Avermelhado */
        .card.unique .card-front, .card.unique .card-back {
            border: 2px solid #dc3545;
            box-shadow: 0 0 50px rgba(220, 53, 69, 1.0);
        }

        .card-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .card-description {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .rarity-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        /* Indicadores de raridade */
        .uncommon .rarity-indicator { background: #c0c0c0; } /* Comuns */
        .rare .rarity-indicator { background: #007bff; } /* Raras */
        .epic .rarity-indicator { background: #800080; } /* Épicas */
        .legendary .rarity-indicator { background: #ffd700; } /* Lendárias */
        .unique .rarity-indicator { background: #dc3545; } /* Únicas */

    </style>
</head>
<body>
    <a href="index.html" class="back-button">VOLTAR</a>
    <button class="reroll-button" onclick="window.location.reload()">Reroll</button>
    <div class="card-container" id="cardContainer">
        <!-- As cartas serão geradas aqui pelo JavaScript -->
    </div>

    <script>
        const classes = [
            // Comuns (44%) - Mapeado para 'uncommon'
            { name: 'Guerreiro', description: 'Combatente versátil, especialista em armas e armaduras.', rarity: 'uncommon' },
            { name: 'Mago', description: 'Conjurador arcano, domina feitiços e conhecimento mágico.', rarity: 'uncommon' },
            { name: 'Caçador', description: 'Rastreador e sobrevivente, eficiente em combate e exploração.', rarity: 'uncommon' },
            { name: 'Clérigo', description: 'Devoto com poderes divinos, cura e protege aliados.', rarity: 'uncommon' },
            { name: 'Ladrão', description: 'Furtivo e habilidoso, especialista em agilidade e truques.', rarity: 'uncommon' },
            { name: 'Feiticeiro', description: 'Usuário de magia inata, canaliza poder bruto e instintivo.', rarity: 'uncommon' },
            { name: 'Druida', description: 'Guardião da natureza, usa magia primal e adaptação.', rarity: 'uncommon' },
            { name: 'Bardo', description: 'Artista carismático, inspira e manipula com música e palavras.', rarity: 'uncommon' },
            { name: 'Monge', description: 'Disciplina e artes marciais, domina corpo e mente.', rarity: 'uncommon' },

            // Raras (28%) - Mapeado para 'rare'
            { name: 'Espadachim', description: 'Especialista em lâminas, técnica refinada e precisão.', rarity: 'rare' },
            { name: 'Atirador', description: 'Perito em ataques à distância, mira e disparos certeiros.', rarity: 'rare' },
            { name: 'Padre', description: 'Líder espiritual, guia e fortalece com fé e ritos.', rarity: 'rare' },
            { name: 'Gladiador', description: 'Lutador de arena, resistência e presença intimidadora.', rarity: 'rare' },
            { name: 'Elementalista', description: 'Manipulador dos elementos, conjura forças naturais.', rarity: 'rare' },

            // Épicas (14%) - Mapeado para 'epic'
            { name: 'Marionetista', description: 'Controla movimentos e decisões com influência sutil.', rarity: 'epic' },
            { name: 'Guardião Celestial', description: 'Protetor com aura divina e dever sagrado.', rarity: 'epic' },
            { name: 'Cavaleiro Dimensional', description: 'Dobra espaço e atravessa limites entre lugares.', rarity: 'epic' },
            { name: 'Domador de Monstros', description: 'Especialista em capturar e comandar criaturas.', rarity: 'epic' },
            { name: 'Engenheiro Arcano', description: 'Combina magia e engenharia em criações únicas.', rarity: 'epic' },
            { name: 'Caçador de Dragões', description: 'Rastreador e executor de feras dracônicas.', rarity: 'epic' },
            { name: 'Artífice', description: 'Constrói e aprimora artefatos mágicos complexos.', rarity: 'epic' },
            { name: 'Tecelão de Destinos', description: 'Interfere em probabilidades e caminhos futuros.', rarity: 'epic' },
            { name: 'Mestre das Runas', description: 'Domina inscrições rúnicas e seus efeitos.', rarity: 'epic' },
            { name: 'Cavaleiro Elemental', description: 'Guerreiro imbuído com forças elementais.', rarity: 'epic' },
            { name: 'Aventureiro', description: 'Explorador lendário, adaptável e experiente.', rarity: 'epic' },
            { name: 'Mestre de Cerco', description: 'Especialista em táticas e destruição de fortificações.', rarity: 'epic' },
            { name: 'Ferreiro de Magia', description: 'Forja equipamentos com propriedades místicas.', rarity: 'epic' },
            { name: 'Mestre dos Elementos', description: 'Controle avançado de múltiplas forças naturais.', rarity: 'epic' },
            { name: 'Portador do Vazio', description: 'Canaliza energia do vazio: risco e poder extremo.', rarity: 'epic' },
            { name: 'Senhor do Caos', description: 'Conjura desordem e efeitos imprevisíveis.', rarity: 'epic' },
            { name: 'Guardião do Éter', description: 'Vigia fronteiras arcanas e planos sutis.', rarity: 'epic' },
            { name: 'Cavaleiro da Luz', description: 'Guerreiro sagrado, purifica trevas com luz.', rarity: 'epic' },

            // Lendárias (9%) - Mapeado para 'legendary'
            { name: 'Herdeiro de Relíquias Antigas', description: 'Portador de artefatos ancestrais e poder raro.', rarity: 'legendary' },
            { name: 'Ilusionista', description: 'Molda percepções e cria realidades falsas.', rarity: 'legendary' },
            { name: 'Manipulador do Tempo', description: 'Interfere no fluxo temporal em janelas precisas.', rarity: 'legendary' },
            { name: 'Fazendeiro', description: 'Mestre da terra e colheitas, prosperidade e sustento.', rarity: 'legendary' },
            { name: 'Ferreiro', description: 'Artesão excepcional, cria e aprimora equipamentos.', rarity: 'legendary' },
            { name: 'Navegador', description: 'Traça rotas e guia jornadas por mar e céu.', rarity: 'legendary' },
            { name: 'Cozinheiro', description: 'Culinária de alto nível, efeitos únicos em refeições.', rarity: 'legendary' },
            { name: 'Herborista', description: 'Especialista em ervas, curas, toxinas e extratos.', rarity: 'legendary' },
            { name: 'Comerciante', description: 'Negociador lendário, influência e recursos vastos.', rarity: 'legendary' },
            { name: 'Mensageiro', description: 'Rapidez e rotas secretas; entrega o impossível.', rarity: 'legendary' },
            { name: 'Escudeiro', description: 'Apoio leal, cresce em bravura e proteção.', rarity: 'legendary' },
            { name: 'Pescador', description: 'Perito em rios e mares, captura o extraordinário.', rarity: 'legendary' },
            { name: 'Arauto da Morte', description: 'Presságio sombrio e poder ligado ao fim.', rarity: 'legendary' },
            { name: 'Lorde dos Pesadelos', description: 'Domina medos e sonhos, impõe terror.', rarity: 'legendary' },
            { name: 'Mestre da Gravidade', description: 'Altera forças gravitacionais ao seu redor.', rarity: 'legendary' },
            { name: 'Avatar de Constelações', description: 'Canaliza poder de estrelas e padrões celestes.', rarity: 'legendary' },
            { name: 'Guardião das Estrelas', description: 'Protege segredos cósmicos e luz estelar.', rarity: 'legendary' },

            // Únicas (5%) - Mapeado para 'unique'
            { name: 'Regressor', description: 'Retorna e reescreve escolhas com conhecimento do futuro.', rarity: 'unique' },
            { name: 'Mestre das Sombras', description: 'Controla sombras para se mover, ocultar e atacar.', rarity: 'unique' },
            { name: 'Colecionador de Habilidades', description: 'Adquire e replica técnicas raras de outros.', rarity: 'unique' },
            { name: 'Contratante', description: 'Firma pactos com entidades em troca de poder.', rarity: 'unique' },
            { name: 'Bibliotecário', description: 'Guardião de conhecimento antigo e proibido.', rarity: 'unique' },
        ];

        function createCard(classData) {
            const card = document.createElement('div');
            card.className = `card ${classData.rarity}`;
            card.addEventListener('click', () => {
                if (card.classList.contains('is-flipped') || card.style.opacity === '0') {
                    return;
                }

                card.classList.toggle('is-flipped');

                const allCards = document.getElementById('cardContainer').getElementsByClassName('card');
                Array.from(allCards).forEach(otherCard => {
                    if (otherCard !== card) {
                        otherCard.style.opacity = '0';
                        setTimeout(() => {
                           otherCard.style.display = 'none';
                        }, 5000);
                    }
                });
            });

            const cardInner = document.createElement('div');
            cardInner.className = 'card-inner';

            const cardFront = document.createElement('div');
            cardFront.className = 'card-front';

            const cardBack = document.createElement('div');
            cardBack.className = 'card-back';
            
            const rarityIndicator = document.createElement('div');
            rarityIndicator.className = 'rarity-indicator';
            
            const title = document.createElement('div');
            title.className = 'card-title';
            title.textContent = classData.name;
            
            const description = document.createElement('div');
            description.className = 'card-description';
            description.textContent = classData.description;
            
            cardBack.appendChild(rarityIndicator);
            cardBack.appendChild(title);
            cardBack.appendChild(description);

            cardInner.appendChild(cardFront);
            cardInner.appendChild(cardBack);

            card.appendChild(cardInner);
            
            return card;
        }

        function animateCards() {
            const container = document.getElementById('cardContainer');
            const cards = container.getElementsByClassName('card');
            
            Array.from(cards).forEach(card => {
                const x = Math.random() * (window.innerWidth - 240);
                const y = Math.random() * (window.innerHeight - 340);
                
                card.style.transform = `translate(${x}px, ${y}px)`;
            });
        }

        function selectRandomClasses(allClasses, numberOfCards) {
            // Chances exatas por raridade:
            // Comuns 44%, Raras 28%, Épicas 14%, Lendárias 9%, Únicas 5%
            const rarityChances = [
                { rarity: 'uncommon', chance: 44 },
                { rarity: 'rare', chance: 28 },
                { rarity: 'epic', chance: 14 },
                { rarity: 'legendary', chance: 9 },
                { rarity: 'unique', chance: 5 },
            ];

            const byRarity = allClasses.reduce((acc, c) => {
                (acc[c.rarity] ||= []).push(c);
                return acc;
            }, {});

            // Cópia (sem repetição) para manter variedade nas cartas
            const availableByRarity = Object.fromEntries(
                Object.entries(byRarity).map(([rarity, list]) => [rarity, [...list]])
            );

            const totalChance = rarityChances.reduce((sum, r) => sum + r.chance, 0);
            if (totalChance !== 100) {
                console.warn(`A soma das chances de raridade não é 100 (atual: ${totalChance}).`);
            }

            function rollRarity() {
                const roll = Math.random() * totalChance;
                let cumulative = 0;
                for (const r of rarityChances) {
                    cumulative += r.chance;
                    if (roll < cumulative) return r.rarity;
                }
                return rarityChances[rarityChances.length - 1].rarity;
            }

            function pickAndRemoveRandom(list) {
                if (!list || list.length === 0) return null;
                const idx = Math.floor(Math.random() * list.length);
                return list.splice(idx, 1)[0];
            }

            const selected = [];
            for (let i = 0; i < numberOfCards; i++) {
                const rarity = rollRarity();
                let picked = pickAndRemoveRandom(availableByRarity[rarity]);

                // Fallback: se esgotou aquela raridade, pega de qualquer raridade ainda disponível
                if (!picked) {
                    const remainingPools = Object.values(availableByRarity).filter(list => list.length > 0);
                    const flat = remainingPools.flat();
                    if (flat.length === 0) break;

                    const fallbackRarity = flat[Math.floor(Math.random() * flat.length)].rarity;
                    picked = pickAndRemoveRandom(availableByRarity[fallbackRarity]);
                }

                if (picked) selected.push(picked);
            }

            return selected;
        }

        function initializeCards() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';

            const selectedClasses = selectRandomClasses(classes, 15);

            selectedClasses.forEach(classData => {
                const card = createCard(classData);
                container.appendChild(card);
            });
            animateCards();
        }

        window.addEventListener('load', initializeCards);
    </script>
</body>
</html>
